name: Release
on:
  push:
    branches: [main]
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # Build first: examples typecheck against the built @viu/emporix-sdk
      # package interface (dist + .d.ts), so dist must exist before typecheck.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - uses: changesets/action@v1
        with:
          # `pnpm run` is required: `pnpm version`/`pnpm publish` are pnpm
          # built-ins that would otherwise shadow our package.json scripts.
          publish: pnpm run release
          version: pnpm run version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
