name: Changeset Check
on: pull_request
jobs:
  changeset:
    name: changeset
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-release') }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # The changesets release PR consumes all changesets, so it legitimately
      # has none. Skip the gate there instead of failing every release PR.
      - name: Changeset status (skip on release PR)
        run: |
          if [ "${{ github.head_ref }}" = "changeset-release/main" ]; then
            echo "Release PR — no changesets expected, skipping."
            exit 0
          fi
          pnpm changeset status --since=origin/${{ github.event.pull_request.base.ref }}
