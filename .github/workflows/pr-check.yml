name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Examples typecheck against the built dist/ of @viu/emporix-sdk and
      # @viu/emporix-sdk-react. Build first so typecheck has the artifacts.
      - name: Build packages
        run: pnpm -r --filter "./packages/*" build

      # esbuild silently drops "use client" directives — guard that the react
      # client entries keep their banner and ssr stays server-importable.
      - name: Check react dist "use client" banners
        run: pnpm -F @viu/emporix-sdk-react check:dist

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
