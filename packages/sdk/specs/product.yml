    dynamicVariantAttributeValue:
      type: object
      description: |
        The value part of a dynamic variant attribute. Holds the canonical qualifier used for matching, an optional localized display label, and an optional unit code for measurement attributes.
      required:
        - type
        - qualifier
      properties:
        type:
          type: string
          description: |
            Data type of the qualifier value.
          enum:
            - STRING
            - NUMBER
            - DECIMAL
            - BOOLEAN
        qualifier:
          description: |
            The canonical value used for variant matching. The JSON type must match `type`: a string for `STRING`, a number for `NUMBER` or `DECIMAL`, or a boolean for `BOOLEAN`.
          oneOf:
            - type: string
            - type: number
            - type: boolean
        name:
          $ref: '#/components/schemas/localizedValue'
        unit:
          type: string
          description: |
            Optional unit code for measurement attributes (for example, `"MMT"` for millimetres, `"PCE"` for pieces). Unit translations are resolved by the frontend from a separate dictionary.
    dynamicVariantAttribute:
      type: object
      description: |
        A single dynamic variant attribute. Combines a localized display name for the attribute itself with a typed, optionally localized value.
      required:
        - value
      properties:
        name:
          $ref: '#/components/schemas/localizedValue'
        value:
          $ref: '#/components/schemas/dynamicVariantAttributeValue'
    ownVariantAttributes:
      type: object
      description: |
        Map of variant attributes defined directly on this product. Keys are attribute identifiers (for example, `storageCapacity`). These are the attributes the caller can set by create/update requests. On responses they represent what is stored on this specific product.
      additionalProperties:
        $ref: '#/components/schemas/dynamicVariantAttribute'
    inheritedVariantAttributes:
      type: object
      description: |
        Read-only map of variant attributes inherited from ancestor products in the hierarchy. These cannot be modified on this product — to change an inherited attribute, update the ancestor that owns it.
      additionalProperties:
        $ref: '#/components/schemas/dynamicVariantAttribute'
    variantMapEntry:
      type: object
      description: |
        A single entry in the root product's `variants` map. In API responses the `variantAttributes` field contains **accumulated** attributes — the entry's own delta attributes merged with all ancestor attributes up the chain, so storefront clients receive a ready-to-use combination without additional API calls. The `published` flag is included only when the caller has the `product.product_read_unpublished` scope.
      properties:
        version:
          type: integer
          description: Version of the source variant product at the time of the last recalculation.
        code:
          type: string
          description: Code of the source variant product.
        name:
          $ref: '#/components/schemas/localizedValue'
        parentVariantId:
          type: string
          description: Identifier of the immediate parent product in the variant hierarchy.
        sellable:
          type: boolean
          description: Indicates whether this variant can be sold directly.
        published:
          type: boolean
          description: |
            Publication state of this variant. Only included in responses when the caller has the `product.product_read_unpublished` scope; entries with `published: false` are otherwise omitted from the map.
        dynamicVariantType:
          type: string
          description: Optional label identifying the variant level or kind (for example, `"H1_L1"`).
        variantAttributes:
          type: object
          description: |
            Accumulated variant attributes for this entry. For leaf variants this includes all ancestor attributes merged with the entry's own delta. Keys are attribute identifiers.
          additionalProperties:
            $ref: '#/components/schemas/dynamicVariantAttribute'
    variantsMap:
      type: object
      description: |
        Denormalized flat map of all descendant variants stored on the root product. Keys are variant product identifiers. In API responses each entry's `variantAttributes` contains accumulated attributes.
      additionalProperties:
        $ref: '#/components/schemas/variantMapEntry'
    dynamicVariantInfo:
      type: object
      description: |
        Hierarchy integrity information populated when the variant tree has structural problems. Present only when an issue is detected.
      properties:
        missingAncestorId:
          type: string
          description: Identifier of an ancestor product that could not be found, indicating a broken hierarchy chain.
        cycleDetected:
          type: boolean
          description: Indicates that a circular reference was detected in the `parentVariantId` chain.
    dynamicVariantProductMetadataGet:
      type: object
      description: Metadata for GET responses on DYNAMIC_VARIANT products. Extends the standard product metadata with hierarchy integrity information.
      allOf:
        - $ref: '#/components/schemas/productMetadataGet'
        - type: object
          properties:
            dynamicVariantInfo:
              $ref: '#/components/schemas/dynamicVariantInfo'
    dynamicVariantProduct:
      type: object
      description: Base schema for products of the DYNAMIC_VARIANT type.
      allOf:
        - $ref: '#/components/schemas/productCore'
        - type: object
          properties:
            metadata:
              $ref: '#/components/schemas/productMetadataCore'
            parentVariantId:
              type: string
              description: |
                Identifier of the immediate parent product in the variant hierarchy. Omit or leave empty for root-level dynamic variant products.
            dynamicVariantType:
              type: string
              description: |
                Optional label identifying the variant level or kind within the hierarchy (for example, `"H1_L1"`). Used for display and filtering purposes.
            sellable:
              type: boolean
              description: |
                Indicates whether this variant can be sold directly, if it's a leaf in the hierarchy that a customer can add to a cart. This value is **not inherited** from parent variants — it must be set explicitly on each product. Root products and intermediate-level variants are typically `false`. Leaf variants are typically `true`.
            ownVariantAttributes:
              $ref: '#/components/schemas/ownVariantAttributes'
          required:
            - name
            - code
    dynamicVariantProductCreation:
      type: object
      description: Creating products of the DYNAMIC_VARIANT type.
      allOf:
        - $ref: '#/components/schemas/dynamicVariantProduct'
        - type: object
          properties:
            id:
              type: string
              maxLength: 32
              description: Custom product identifier. If not provided, it is automatically generated.
            productType:
              $ref: '#/components/schemas/productType'
    dynamicVariantProductWithId:
      type: object
      description: |
        Response schema for products of the DYNAMIC_VARIANT type.

        - **`sellable`** — not inherited from parents; must be set explicitly on each product. Root and intermediate variants are typically `false`; leaf variants are typically `true`.
        - **Root products** include a `variants` map containing all descendants with accumulated attributes.
        - **Child products** include `ownVariantAttributes` (attributes defined on this product) and `inheritedVariantAttributes` (read-only, merged from ancestors).
        - `parentVariantPath` is an ordered array of ancestor IDs from direct parent (index 0) to root (last index). Empty for root products.
        - `metadata.dynamicVariantInfo` is present only when a hierarchy integrity issue is detected.
      properties:
        id:
          $ref: '#/components/schemas/id'
        yrn:
          $ref: '#/components/schemas/YRN'
        code:
          type: string
          minLength: 1
          description: 'Unique product identifier, defined by the user.'
        name:
          $ref: '#/components/schemas/localizedValue'
        description:
          $ref: '#/components/schemas/localizedValue'
        productType:
          $ref: '#/components/schemas/productType'
        published:
          $ref: '#/components/schemas/published'
        sellable:
          type: boolean
          description: |
            Indicates whether this variant can be sold directly (i.e. it is a leaf in the hierarchy that a customer can add to a cart). This value is **not inherited** from parent variants — it must be set explicitly on each product. Root products and intermediate-level variants are typically `false`; leaf variants are typically `true`.
        parentVariantId:
          type: string
          description: Identifier of the immediate parent product in the variant hierarchy. Absent for root-level products.
        parentVariantPath:
          type: array
          description: |
            Ordered array of ancestor product identifiers, from the direct parent (index 0) to the root (last index). Empty for root-level products.
          items:
            type: string
        dynamicVariantType:
          type: string
          description: Optional label identifying the variant level or kind within the hierarchy (for example, `"H1_L1"`).
        ownVariantAttributes:
          $ref: '#/components/schemas/ownVariantAttributes'
        inheritedVariantAttributes:
          $ref: '#/components/schemas/inheritedVariantAttributes'
        variants:
          $ref: '#/components/schemas/variantsMap'
        taxClasses:
          $ref: '#/components/schemas/taxClasses'
        vendor:
          $ref: '#/components/schemas/vendor'
        brandId:
          type: string
          description: ID of brand.
        brand:
          $ref: '#/components/schemas/brand'
        labelIds:
          type: array
          items:
            type: string
          description: Collection of label IDs.
        labels:
          type: array
          items:
            $ref: '#/components/schemas/label'
        categoryIds:
          type: array
          description: Category IDs assigned to the product.
          items:
            type: string
        customerSegmentIds:
          type: array
          description: Customer segment IDs assigned to the product.
          items:
            type: string
        relatedItems:
          type: array
          description: List of items in a relationship with this product.
          items:
            $ref: '#/components/schemas/relatedItem'
        weightDependent:
          type: boolean
          description: Mark the product as weight-dependent if the line item price could change after packaging.
        mixins:
          $ref: '#/components/schemas/productMixins'
        media:
          $ref: '#/components/schemas/productMedia'
        metadata:
          $ref: '#/components/schemas/dynamicVariantProductMetadataGet'
      required:
        - id
        - code
        - name
        - productType
    dynamicVariantProductsArray:
      type: array
      description: List of products of the DYNAMIC_VARIANT type.
      items:
        $ref: '#/components/schemas/dynamicVariantProductWithId'
    dynamicVariantProductUpdate:
      type: object
      description: Updating products of the DYNAMIC_VARIANT type.
      allOf:
        - $ref: '#/components/schemas/dynamicVariantProduct'
        - type: object
          properties:
            metadata:
              $ref: '#/components/schemas/productMetadataWithVersion'
            productType:
              $ref: '#/components/schemas/productTypeUpdate'
    dynamicVariantProductBulkUpdate:
      type: object
      description: Updating products of the DYNAMIC_VARIANT type in bulk.
      allOf:
        - $ref: '#/components/schemas/dynamicVariantProductUpdate'
        - type: object
          properties:
            id:
              $ref: '#/components/schemas/id'
          required:
            - id
    dynamicVariantRecalculationRequest:
      type: object
      description: |
        Request body for triggering dynamic variant recalculation. Accepts up to 1000 product IDs at any level of the hierarchy — the system resolves the root for each ID automatically. Intended to be called after a batch of products has been fully ingested, not per individual product write.
      required:
        - productIds
      properties:
        productIds:
          type: array
          description: |
            List of product IDs (variants at any hierarchy level) for which recalculation should be triggered. The system groups IDs by their root product and creates one job per unique root.
          minItems: 1
          maxItems: 1000
          items:
            type: string
    dynamicVariantRecalculationJobStatus:
      type: string
      description: Current status of a dynamic variant recalculation job.
      enum:
        - PENDING
        - PROCESSING
        - FINISHED
        - FAILED
        - FAILED_PERMANENT
    dynamicVariantRecalculationJobResponse:
      type: object
      description: |
        Represents a single dynamic variant recalculation job. One job is created per unique root product. Jobs remain queryable until automatically removed approximately 30 days after reaching a terminal state.
      properties:
        id:
          type: string
          description: Unique identifier of the recalculation job.
        parentRoot:
          type: string
          description: Identifier of the root product whose variant tree is being recalculated.
        requestedByIds:
          type: array
          description: List of product IDs that were submitted in the recalculation request and resolved to this root.
          items:
            type: string
        status:
          $ref: '#/components/schemas/dynamicVariantRecalculationJobStatus'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the job was created.
        processingStartedAt:
          type: string
          format: date-time
          description: Timestamp when a subscriber picked up the job and started processing. Null while the job is still PENDING.
        finishedAt:
          type: string
          format: date-time
          description: Timestamp when the job reached a terminal state (FINISHED, FAILED, or FAILED_PERMANENT).
        error:
          type: string
          description: Error message if the job failed. Null for successful jobs.
        attempts:
          type: integer
          description: Number of processing attempts made for this job. Incremented on each delivery from the pub/sub subscription.
    dynamicVariantRecalculationResponse:
      type: object
      description: |
        Response returned when recalculation is triggered. Contains one job per unique root product resolved from the submitted IDs, plus any IDs that were skipped (for example, because a job for that root is already PENDING or PROCESSING).
      properties:
        jobs:
          type: array
          description: List of recalculation jobs created or referenced for each unique root product.
          items:
            $ref: '#/components/schemas/dynamicVariantRecalculationJobResponse'
        skippedProductIds:
          type: array
          description: |
            Product IDs that were not processed because a recalculation job for their root is already active (PENDING or PROCESSING). The existing job ID is available in the `jobs` list.
          items:
            type: string
    productPartialUpdate:
      type: object
      description: Partially updating a product.
      additionalProperties: false
      allOf:
        - $ref: '#/components/schemas/productCore'
        - type: object
          properties:
            template:
              $ref: '#/components/schemas/template'
            bundledProducts:
              $ref: '#/components/schemas/bundledProducts'
            variantAttributes:
              $ref: '#/components/schemas/variantAttributes'
            metadata:
              $ref: '#/components/schemas/productMetadataWithVersion'
    vendor:
      type: object
      properties:
        id:
          type: string
          description: An identifier of a vendor to whom the product belongs.
        name:
          type: string
          description: Vendor name.
      required:
        - id
    searchProducts:
      type: object
      properties:
        q:
          type: string
          description:  |
            A standard query parameter is used to search for specific values. 
            
            See: [Standard practises - Query parameter](https://developer.emporix.io/api-references/standard-practices/q-param)
    searchQuery:
      type: object
      additionalProperties: false
      properties:
        yrns:
          description: List of YRNs. Each YRN identifies a separate product.
          type: array
          items:
            $ref: '#/components/schemas/YRN'
        params:
          description: Optional query parameters.
          type: object
          properties:
            product:
              description: Optional query parameters for products.
              type: object
              properties:
                fields:
                  description: Optional projection for product.
                  type: array
                  items:
                    type: string
      required:
        - yrns
    relatedItem:
      title: relatedItem
      type: object
      properties:
        refId:
          type: string
          description: 'Identifier of a product which is in the relationship with the main product. The product identifier has to exist. '
        type:
          type: string
          description: A relation type. The type has to exist in the system. All relation types are defined in configuration service under `relation_types` key.
      required:
        - refId
        - type
    bulkResponse:
      title: bulkResponse
      type: object
      properties:
        index:
          type: integer
          description: |
            Index of the processed product, matching the price position in request body.
        id:
          type: string
          description: Product unique identifier.
        code:
          type: integer
          description: HTTP Status Code.
        errorCode:
          type: string
          description: Error specific errorCode.
        status:
          type: string
          description: HTTP Status description.
        message:
          type: string
          description: Error message.
        details:
          type: array
          description: Error message details.
          items:
            type: string
  parameters:
    path_tenant:
      name: tenant
      in: path
      required: true
      description: |
        Your Emporix tenant name.

        **Note**: The tenant should always be written in lowercase.
      schema:
        pattern: '^[a-z][a-z0-9]+$'
        minLength: 3
        maxLength: 16
        type: string
    query_page_number:
      name: pageNumber
      in: query
      required: false
      schema:
        type: integer
      description: The page number to be retrieved where the size of the pages must be specified by the pageSize parameter. The number of the first page is 1.
    query_page_size:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        default: 60
      description: The number of documents being retrieved on the page.
    query_sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
      description: |
        Fields to sort the response data by following order of the parameters from left to right.
        Can contain multiple fields in format: `field name:sort direction` separated by a comma.
        The colon with `sort direction` parameter is redundant and descending order is taken only if it is equal to `desc` or `DESC`.
        Ascending order is considered in any other case.
        While sorting by a localised field the following rule is taken into account:
          1. If a localized field contains information about a language, then the language should be used. For example `name.en:ASC`. In that case en language is used for sorting the name property. The language suffix takes precedence over `Accept-Language` header.
          2. If a localized field does not contain information about a language, then the `Accept-Language` header is used. For example `name:ASC` and `Accept-Language: de`. In that case `de` is used for sorting the name property.
          3. If a localized field does not contain information about language and `Accept-Language` header contains `*`, then the default language from configuration service is used as a language. For example `name:ASC` and `Accept-Language: *` and default language is pl then pl is used as a language for name property.
          4. If a localized field does not contains information about language and `Accept-Language` header does not exists in the request, then the default language from configuration service is used.  "
    header_content_language:
      name: Content-Language
      in: header
      required: false
      schema:
        type: string
      description: |
        The Content-Language request HTTP header defines a language or multiple languages of the request body.

        * If the `Content-Language` header is set to `*`, the localized fields should be provided as maps of translations, where the keys are language codes and values are the fields in their respective languages.
        * If the `Content-Language` header is set to a specific language, the localized fields should be provided as strings.
        * If the `Content-Language` header is empty, the endpoint interprets the localized fields as being provided in the default language or the languages defined in the Configuration Service.

        **Note**: You can provide the localized fields only in languages defined in the Configuration Service. In case the fields are provided in languages that are not defined in the Configuration Service, the request is rejected.
    header_accept_language:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      description: 'The Accept-Language request HTTP header defines which languages the client is able to understand, and which locale variant is preferred. If empty, the default system language is assumed. It can be a priority list working as a fallback mechanism.'
    header_x_total_count:
      name: X-Total-Count
      in: header
      required: false
      schema:
        type: boolean
      description: Flag indicating whether the total number of retrieved results should be returned.
    path_productId:
      in: path
      name: productId
      schema:
        type: string
      required: true
      description: Product unique identifier generated when the product is created.
    query_q_product:
      name: q
      in: query
      description:  |
        A standard query parameter is used to search for specific values. 
        
        See: [Standard practises - Query parameter](https://developer.emporix.io/api-references/standard-practices/q-param)
      schema:
        type: string
        example: 'name:{productName}'
    query_sort_product:
      name: sort
      in: query
      description: |
        List of properties used to sort the results, separated by colons.

        Possible values:
        * `{fieldName}`
        * `{fieldName}:asc`
        * `{fieldName}:desc`

        **Note:** If you want to sort the results by localized properties, the possible values are:
          * `{fieldName}.{language}`
          * `{fieldName}.{language}:asc`
          * `{fieldName}.{language}:desc`

        By default, the fields are sorted in ascending order.
      schema:
        type: string
    query_partial_product:
      name: partial
      in: query
      required: false
      description: |
        | Option  | Description |
        |---|---|
        | `true` | A partial product update is performed. |
        | `false` | A full product replacement is performed.|
      schema:
        type: boolean
        default: false
    query_raw_value_product:
      in: query
      name: rawValue
      schema:
        type: boolean
      required: false
      description: |
        Flag indicating whether product variant(s) should include their parent variants' attribute values.
        * If set to `true`, the result contains values from both the variant and its parent variant.
        * If set to `false`, the result contains only variant values.
    query_expand_search:
      name: expand
      in: query
      required: false
      schema:
        type: string
      description: |
        Fields that should be expanded with additional information in the response body. Expressed as strings separated by commas.

        Possible values:
          * `template`
    query_expand_product:
      name: expand
      in: query
      required: false
      schema:
        type: string
      description: |
        Fields that should be expanded with additional information in the response body. Expressed as strings separated by commas. You can combine multiple values, for example `expand=template,parentVariant,brand,labels`.

        Possible values:
          * `template`
          * `parentVariant`
          * `brand`
          * `labels`
    query_force_product:
      name: force
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: |
        Removing a parent variant product also removes all of its child variants. This applies to both `PARENT_VARIANT` roots with `VARIANT` children and `DYNAMIC_VARIANT` parent products with all descendant dynamic variants in the tree. This operation has to be confirmed by setting `force=true`.
    path_productTemplateId:
      name: product-template-id
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of the product template.
    query_q_param_product_template:
      name: q
      in: query
      required: false
      schema:
        type: string
      description: |
        Standard query parameter used to search for specific values.   
        * Searching for an item by string property: `q=id:31065d5b-b62e`, where `id` is the field name and `31065d5b-b62e` is its required value.   
        * Searching for an item by localized field property: `q=name.en:T-s` where `name` is the name of the field, `en` is a language code and `T-s` is a required value of this field.   This query works only for localized fields, which are stored in a Map format where `key` is a language code and `value` is translation to particular language.   + Searching for items by date property. All numer-based property queries are valid also for dates. In that case the date should be placed within double quotes: `q=metadata.createdAt:(>="2021-05-18T07:27:27.455Z" AND <"2021-05-20T07:27:27.455Z")`   + Searching for items with non existing or empty property: `q=name.en:null` where `name.en` is a name of fields that has value `null`.   + Searching for items with existing property: `q=attributes:exists` where `attributes` is a name of field that has `non null` value.   + Searching for items by multiple specific values: `q=id:(5c3325baa9812100098ff48f,5c3325d1a9812100098ff494)` where `id` is name of field and strings within a bracket are it''s required value.   + Searching for items by multiple fields: `q=id:5c3325baa9812100098ff48f name.en:T-s` where `id` and ''name.en'' are the names of fields. All documents that contain given values of these fields are returned. Multiple fields separated by space can be specified. Multiple values for each field can be also specified in a format presented above.   + Searching for items with string fields conforming to a regex: `q=name.en:~ABCD12` or `q=name.en:(~AB CD)` - in case of searching for strings with space, where `name` is the name of field and `ABCD12` or `AB CD` is it''s querying regex.'
    query_version_parameter_product_template:
      name: version
      in: query
      required: false
      schema:
        type: string
      description: 'Version of the product template. If the parameter is not provided, the latest version of product template is returned.'
    query_product_fields:
      name: fields
      in: query
      required: false
      description: |
        Fields to be returned in the response.

        When this parameter is passed, only the `id`, `yrn` and `{fieldName}` are retrieved for each product.

        You can specify multiple fields by separating them with commas.
      schema:
        type: string
        example: 'name,code'
    query_skip_variants_generation:
      name: skipVariantGeneration
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: The parameter is valid only for `PARENT_VARIANT` type. If true then variants are not automatically generated for the parent variant configuration.
    query_do_index:
      name: doIndex
      in: query
      required: false
      schema:
        type: boolean
        default: true
      description: Allows to control whether the change of the state should cause reindexing or not.
    query_skip_related_items_validation:
      name: skipRelatedItemsValidation
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: If set to `true`, the validation that checks whether related products exist is skipped. This is useful during data loading, where related products may not yet exist and will be created later. This parameter is only respected when the `allowToSkipRelatedProductsValidation` system setting is set to `true`. Otherwise, it is disregarded.
