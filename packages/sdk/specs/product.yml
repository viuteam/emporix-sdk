openapi: 3.0.0
info:
  title: Product Service
  version: ''
  contact:
    email: documentation@emporix.com
  description: |
    Manage structured product information.
servers:
  - url: 'https://api.emporix.io'
tags:
  - name: Products
    description: |
      Manage products. Supported product types include:
      - `BASIC` — standalone products
      - `BUNDLE` — groups of products sold together
      - `PARENT_VARIANT` — products with automatically generated variants defined by a template
      - `VARIANT` — individual variants of a `PARENT_VARIANT` product
      - `DYNAMIC_VARIANT` — products forming a flexible variant hierarchy of up to 4 levels. Each variant stores its own `ownVariantAttributes` (the attributes that distinguish it from its parent). A root `DYNAMIC_VARIANT` product stores a denormalized flat map of all descendants in its `variants` field with accumulated attributes. Use the `/recalculate` endpoint to rebuild variant trees after bulk imports.
  - name: Product Templates
    description: Manage product templates. Product templates define a set of attributes which are common for all product instances based on that template.
paths:
  /product/{tenant}/products/search:
    parameters:
      - $ref: '#/components/parameters/path_tenant'
    post:
      responses:
        '200':
          $ref: '#/components/responses/products_get_response_OK_200'
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
      description: |
        Search a list of products.
        ***

        **Additional scope information**

        * The `product.product_read_unpublished` scope is only required if the response should contain unpublished products.
        * The `product.product_read_by_vendor` scope is only required to fetch products belonging to the vendor.

        ***
      operationId: POST-product-search-products
      requestBody:
        $ref: '#/components/requestBodies/productsSearchBody'
      security:
        - OAuth2:
            - product.product_read_by_vendor
            - product.product_read_unpublished
      parameters:
        - $ref: '#/components/parameters/header_x_total_count'
        - $ref: '#/components/parameters/query_page_number'
        - $ref: '#/components/parameters/query_page_size'
        - $ref: '#/components/parameters/query_sort_product'
        - $ref: '#/components/parameters/query_product_fields'
        - $ref: '#/components/parameters/header_accept_language'
        - $ref: '#/components/parameters/query_expand_product'
        - $ref: '#/components/parameters/query_raw_value_product'
      summary: Searching for products
      tags:
        - Products
  /product/{tenant}/products:
    parameters:
      - $ref: '#/components/parameters/path_tenant'
    get:
      responses:
        '200':
          $ref: '#/components/responses/products_get_response_OK_200'
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
      description: |
        Retrieves a list of products.
        ***

        **Additional scope information**

        * The `product.product_read_unpublished` scope is only required if the response should contain unpublished products.
        * The `product.product_read_by_vendor` scope is only required to fetch products belonging to the vendor.
        * The `product.product_manage_by_vendor` scope is only required to manage products belonging to the vendor.

        ***
      operationId: GET-product-list-products
      security:
        - OAuth2:
            - product.product_read_by_vendor
            - product.product_read_unpublished
            - product.product_manage_by_vendor
      parameters:
        - $ref: '#/components/parameters/header_x_total_count'
        - $ref: '#/components/parameters/query_page_number'
        - $ref: '#/components/parameters/query_page_size'
        - $ref: '#/components/parameters/query_sort_product'
        - $ref: '#/components/parameters/query_q_product'
        - $ref: '#/components/parameters/query_product_fields'
        - $ref: '#/components/parameters/header_accept_language'
        - $ref: '#/components/parameters/query_expand_product'
        - $ref: '#/components/parameters/query_raw_value_product'
      summary: Retrieving all products
      tags:
        - Products
    post:
      responses:
        '201':
          description: |
            The resource has been successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceLocation'
              examples:
                Product successfully created:
                  $ref: '#/components/examples/product_post_Created_201'
                Variant successfully created:
                  $ref: '#/components/examples/variant_post_Created_201'
        '400':
          $ref: '#/components/responses/products_post_response_BadRequest_400'
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '409':
          $ref: '#/components/responses/common_response_Conflict_409'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
      description: |-
        Creates a new product.
        ***

        **Additional scope information**

        * The `product.product_manage_by_vendor` scope is only required for vendor employeesto manage products belonging to the vendor.
        * The `product.product_publish` scope is only required if you want to publish the product when creating it.

        ***
      operationId: POST-product-create-product
      requestBody:
        $ref: '#/components/requestBodies/productCreateBody'
      security:
        - OAuth2:
            - product.product_manage
            - product.product_manage_by_vendor
            - product.product_publish
      parameters:
        - $ref: '#/components/parameters/path_tenant'
        - $ref: '#/components/parameters/header_content_language'
        - $ref: '#/components/parameters/query_skip_variants_generation'
        - $ref: '#/components/parameters/query_do_index'
        - $ref: '#/components/parameters/query_skip_related_items_validation'
      summary: Creating a new product
      tags:
        - Products
  /product/{tenant}/products/bulk:
    parameters:
      - schema:
          type: string
        name: tenant
        in: path
        required: true
        description: 'Your Emporix tenant''s name.**Note**: The tenant should always be written in lowercase.'
    post:
      summary: Creating multiple products
      operationId: POST-product-create-bulk-products
      responses:
        '207':
          $ref: '#/components/responses/products_create_in_bulk_response'
        '400':
          $ref: '#/components/responses/products_post_response_BadRequest_400'
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '404':
          $ref: '#/components/responses/common_response_Conflict_409'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
      tags:
        - Products
      description: |-
        Creates products in a bulk. The maximum batch size is 200.

        Response for a particular product is returned at the same position (index) at which that price is located in the request body.

        **Additional scope information**

        * The `product.product_manage_by_vendor` scope is only required for vendor employees to manage products belonging to the vendor.
        * The `product.product_publish` scope is only required if you want to publish the product when creating it.

        ***
      security:
        - OAuth2:
            - product.product_manage
            - product.product_manage_by_vendor
            - product.product_publish
      requestBody:
        $ref: '#/components/requestBodies/productBulkCreateBody'
      parameters:
        - $ref: '#/components/parameters/header_content_language'
        - $ref: '#/components/parameters/query_skip_variants_generation'
        - $ref: '#/components/parameters/query_do_index'
        - $ref: '#/components/parameters/query_skip_related_items_validation'
    put:
      responses:
        '207':
          $ref: '#/components/responses/products_update_in_bulk_response'
        '400':
          $ref: '#/components/responses/common_response_BadRequest_400'
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
      description: |-
        Updates or creates products in a bulk. The maximum batch size is 200.

        Response for a particular product is returned at the same position (index) at which it is located in the request body.
        ***

        **Additional scope information**

        * The `product.product_manage_by_vendor` scope is only required for vendor employees to manage products belonging to the vendor.
        * The `product.product_publish` scope is only required if you want to publish the product when updating it.
        * The `product.product_unpublish` scope is only required if you want to unpublish the product when updating it.

        ***
      operationId: PUT-product-update-bulk-products
      requestBody:
        $ref: '#/components/requestBodies/productBulkUpdateBody'
      security:
        - OAuth2:
            - product.product_manage
            - product.product_manage_by_vendor
            - product.product_publish
            - product.product_unpublish
      parameters:
        - $ref: '#/components/parameters/header_content_language'
        - $ref: '#/components/parameters/query_skip_variants_generation'
        - $ref: '#/components/parameters/query_do_index'
        - $ref: '#/components/parameters/query_skip_related_items_validation'
      summary: Upserting multiple products
      tags:
        - Products
  /product/{tenant}/products/recalculate:
    parameters:
      - $ref: '#/components/parameters/path_tenant'
    post:
      summary: Triggering dynamic variant recalculation
      operationId: POST-product-trigger-dynamic-variant-recalculation
      tags:
        - Products
      description: |-
        Triggers asynchronous recalculation of the variant tree for one or more `DYNAMIC_VARIANT` products. Accepts up to 1000 product IDs at any hierarchy level — the system automatically resolves the root for each ID and creates one recalculation job per unique root product.

        This endpoint is intended to be called **after** a batch of products has been fully ingested, not per individual product write. For single product writes, the variant tree is updated synchronously inline.

        If a recalculation job for a given root is already `PENDING` or `PROCESSING`, the corresponding IDs are returned in `skippedProductIds` and the existing job is referenced in the `jobs` list.
      security:
        - OAuth2:
            - product.product_manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dynamicVariantRecalculationRequest'
            examples:
              Trigger recalculation for multiple products:
                value:
                  productIds:
                    - mobile-15-pro-l1
                    - mobile-15-pro-l2-retail
                    - mobile-16-pro-l1
      responses:
        '202':
          description: |
            Recalculation jobs accepted. One job is created per unique root product resolved from the submitted IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dynamicVariantRecalculationResponse'
              examples:
                Recalculation accepted:
                  value:
                    jobs:
                      - id: job-a1b2c3d4-e5f6-7890-abcd-ef1234567890
                        parentRoot: mobile-15-pro
                        requestedByIds:
                          - mobile-15-pro-l1
                          - mobile-15-pro-l2-retail
                        status: PENDING
                        createdAt: '2024-01-15T10:10:00.000Z'
                        processingStartedAt: null
                        finishedAt: null
                        error: null
                        attempts: 0
                      - id: job-b2c3d4e5-f6a7-8901-bcde-f12345678901
                        parentRoot: mobile-16-pro
                        requestedByIds:
                          - mobile-16-pro-l1
                        status: PENDING
                        createdAt: '2024-01-15T10:10:00.000Z'
                        processingStartedAt: null
                        finishedAt: null
                        error: null
                        attempts: 0
                    skippedProductIds: []
                Partial skip - job already active:
                  value:
                    jobs:
                      - id: job-existing-c3d4e5f6-a7b8-9012-cdef-123456789012
                        parentRoot: mobile-15-pro
                        requestedByIds:
                          - mobile-15-pro-l1
                        status: PROCESSING
                        createdAt: '2024-01-15T09:55:00.000Z'
                        processingStartedAt: '2024-01-15T09:55:05.000Z'
                        finishedAt: null
                        error: null
                        attempts: 1
                    skippedProductIds:
                      - mobile-15-pro-l2-retail
        '400':
          $ref: '#/components/responses/products_post_response_BadRequest_400'
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
  /product/{tenant}/products/recalculate/jobs:
    parameters:
      - $ref: '#/components/parameters/path_tenant'
    get:
      summary: Listing recalculation jobs
      operationId: GET-product-list-recalculation-jobs
      tags:
        - Products
      description: |-
        Retrieves a list of dynamic variant recalculation jobs for the tenant. Optionally filtered by job status.

        Jobs are retained for approximately 30 days after reaching a terminal state (`FINISHED`, `FAILED`, or `FAILED_PERMANENT`) and are then automatically removed by a TTL index.
      security:
        - OAuth2:
            - product.product_manage
      parameters:
        - name: status
          in: query
          required: false
          description: Filter jobs by status. If omitted, all jobs are returned.
          schema:
            $ref: '#/components/schemas/dynamicVariantRecalculationJobStatus'
      responses:
        '200':
          description: Jobs retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/dynamicVariantRecalculationJobResponse'
              examples:
                List of jobs:
                  value:
                    - id: job-a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      parentRoot: mobile-15-pro
                      requestedByIds:
                        - mobile-15-pro-l1
                        - mobile-15-pro-l2-retail
                      status: FINISHED
                      createdAt: '2024-01-15T10:10:00.000Z'
                      processingStartedAt: '2024-01-15T10:10:03.000Z'
                      finishedAt: '2024-01-15T10:10:07.000Z'
                      error: null
                      attempts: 1
                    - id: job-b2c3d4e5-f6a7-8901-bcde-f12345678901
                      parentRoot: mobile-16-pro
                      requestedByIds:
                        - mobile-16-pro-l1
                      status: PENDING
                      createdAt: '2024-01-15T10:10:00.000Z'
                      processingStartedAt: null
                      finishedAt: null
                      error: null
                      attempts: 0
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
  /product/{tenant}/products/recalculate/jobs/{jobId}:
    parameters:
      - $ref: '#/components/parameters/path_tenant'
      - name: jobId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the recalculation job.
    get:
      summary: Retrieving a recalculation job
      operationId: GET-product-get-recalculation-job
      tags:
        - Products
      description: |-
        Retrieves the current status and details of a specific dynamic variant recalculation job. Use this endpoint to poll for job completion after triggering recalculation.
      security:
        - OAuth2:
            - product.product_manage
      responses:
        '200':
          description: Job retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dynamicVariantRecalculationJobResponse'
              examples:
                Job finished successfully:
                  value:
                    id: job-a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    parentRoot: mobile-15-pro
                    requestedByIds:
                      - mobile-15-pro-l1
                      - mobile-15-pro-l2-retail
                    status: FINISHED
                    createdAt: '2024-01-15T10:10:00.000Z'
                    processingStartedAt: '2024-01-15T10:10:03.000Z'
                    finishedAt: '2024-01-15T10:10:07.000Z'
                    error: null
                    attempts: 1
                Job pending:
                  value:
                    id: job-b2c3d4e5-f6a7-8901-bcde-f12345678901
                    parentRoot: mobile-16-pro
                    requestedByIds:
                      - mobile-16-pro-l1
                    status: PENDING
                    createdAt: '2024-01-15T10:10:00.000Z'
                    processingStartedAt: null
                    finishedAt: null
                    error: null
                    attempts: 0
                Job failed:
                  value:
                    id: job-c3d4e5f6-a7b8-9012-cdef-123456789012
                    parentRoot: mobile-17-pro
                    requestedByIds:
                      - mobile-17-pro-l1
                    status: FAILED
                    createdAt: '2024-01-15T10:08:00.000Z'
                    processingStartedAt: '2024-01-15T10:08:05.000Z'
                    finishedAt: '2024-01-15T10:08:12.000Z'
                    error: 'Database write timeout during variant tree update'
                    attempts: 3
        '401':
          $ref: '#/components/responses/common_response_Unauthorized_401'
        '403':
          $ref: '#/components/responses/common_response_Forbidden_403'
        '404':
          $ref: '#/components/responses/product_NotFound_404'
        '500':
          $ref: '#/components/responses/common_response_InternalServerError_500'
