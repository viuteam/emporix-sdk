openapi: 3.0.0
info:
  title: Availability Service
  version: ''
  description: |-
    Manage the availability and physical location of a product.

  contact:
    name: Emporix
    url: https://emporix.com
    email: documentation@emporix.com
    
servers:
  - url: 'https://api.emporix.io'
tags:
  - name: Locations
  - name: Availabilities
paths:
  /availability/{tenant}/locations/{site}:
    parameters:
      - $ref: '#/components/parameters/tenant-path'
      - $ref: '#/components/parameters/site-path'
    get:
      tags:
        - Locations
      deprecated: true
      summary: Retrieving all locations for a site
      description: |-
        Retrieves all locations for a specified site.
      security:
        - OAuth2:
            - availability.availability_view
      responses:
        '200':
          description: The request was successful. A list of locations is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationList'
              examples:
                Response example:
                  $ref: '#/components/examples/LocationList'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '404':
          $ref: '#/components/responses/NotFoundResponse404'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: GET-availability-retrieve-locations-site
    post:
      tags:
        - Locations
      deprecated: true
      summary: Adding a new location to a site
      description: |-
        Adds a new location to a specified site.
      security:
        - OAuth2:
            - availability.availability_manage
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Location'
            examples:
              Request example:
                $ref: '#/components/examples/Location'
      responses:
        '201':
          description: ' The request was successful. The location has been added to the site.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                message: 'Successfully created location with id: shop1:1234'
                code: 201
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '409':
          $ref: '#/components/responses/ConflictResponse409'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: POST-availability-add-locations-site
    put:
      tags:
        - Locations
      deprecated: true
      summary: Updating locations
      description: |-
        Updates locations for a specified site.
      security:
        - OAuth2:
            - availability.availability_manage
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationOrderList'
            examples:
              Request example:
                $ref: '#/components/examples/LocationOrderList'
      responses:
        '200':
          description: ' The request was successful. The locations have been updated.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                message: Successfully modified 5 location(s)
                code: 200
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: PUT-availability-update-locations-site
  /availability/{tenant}/locations/{location}:
    description: Availability service
    parameters:
      - $ref: '#/components/parameters/tenant-path'
    delete:
      tags:
        - Locations
      deprecated: true
      summary: Deleting a location
      description: |-
        Deletes a specified location.
      security:
        - OAuth2:
            - availability.availability_manage
      parameters:
        - $ref: '#/components/parameters/tenant-path'
        - $ref: '#/components/parameters/location-path'
      responses:
        '200':
          description: ' The request was successful. The location has been deleted.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                message: Successfully deleted 5 location(s)
                code: 200
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: DELETE-availability-remove-location
  /availability/{tenant}/search/locations:
    description: Availability service
    post:
      deprecated: true
      summary: Retrieving product locations
      description: |-
        Retrieves locations of specified products.
      security:
        - OAuth2:
            - availability.availability_view
      parameters:
        - $ref: '#/components/parameters/tenant-path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationSearch'
            examples:
              Request example:
                $ref: '#/components/examples/LocationSearch'
      responses:
        '200':
          description: The request was successful. A list of locations is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductLocationList'
              examples:
                Response example:
                  $ref: '#/components/examples/ProductLocationList'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '404':
          $ref: '#/components/responses/NotFoundResponse404'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: POST-availability-search-locations
      tags:
        - Locations
    parameters:
      - $ref: '#/components/parameters/tenant-path'
  /availability/{tenant}/availability/site/{site}:
    description: Availability service
    parameters:
      - $ref: '#/components/parameters/tenant-path'
      - $ref: '#/components/parameters/site-path'
      - $ref: '#/components/parameters/page-size'
      - $ref: '#/components/parameters/page-number'
    get:
      summary: Retrieving all availability information for a site
      description: |-
        Retrieves all availability information for a specified site.

        **Note**: When a product bundle is retrieved, availability is returned both for its particular products and for the bundle as a whole. The bundle availability is equal to the lowest availability found in its products.

        ***

        ### **Additional scope information**
        * The `availability.availability_view_by_vendor` scope is required only when fetching availabilities for a specific vendor. 

        ***
      security:
        - OAuth2: 
            - availability.availability_view_by_vendor
      responses:
        '200':
          description: The request was successful. A list of availabilities is returned.
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total number of availabilities matching the query criteria.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityList'
              examples:
                Response example:
                  $ref: '#/components/examples/AvailabilityList'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: GET-availability-retrieve-availability-site
      parameters:
        - $ref: '#/components/parameters/page-size'
        - $ref: '#/components/parameters/page-number'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/sort'
      tags:
        - Availabilities
  '/availability/{tenant}/availability/search':
    post:
      tags:
        - Availabilities
      summary: Retrieving product availabilities
      description: |-
        Retrieves availabilities for specified products. The request body accepts one of two mutually exclusive formats:

        * **List of product IDs** — retrieves availabilities for the specified products. If the product ID refers to a product bundle, availability information for the entire bundle is returned. The `site` query parameter is optional.
        * **Q-param object** — retrieves availabilities matching the provided query criteria. The response will **not** include avaialbilities for product bundles. The `site` query parameter must **not** be provided together with the Q-param body.

        ***

        ### **Additional scope information**
        * The `availability.availability_view_by_vendor` scope is required only when fetching availabilities for a specific vendor. 

        ***
      security:
        - OAuth2:
            - availability.availability_view_by_vendor
      parameters:
        - $ref: '#/components/parameters/tenant-path'
        - $ref: '#/components/parameters/site'
        - $ref: '#/components/parameters/page-size'
        - $ref: '#/components/parameters/page-number'
        - $ref: '#/components/parameters/sort'
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  description: IDs of products for which availabilities should be retrieved.
                  items:
                    type: string
                - type: object
                  description: Query criteria for filtering availabilities.
                  properties:
                    q:
                      type: string
                      description: |
                        A standard query parameter used to search for specific values.

                        See: [Standard Practices - Query parameter](https://developer.emporix.io/docs/content/q-param)
                  required:
                    - q
            examples:
              Product IDs:
                value:
                  - 5f7c996173fc281cdd412345
                  - 5f7c996173fc281cdd412346
              Q-param:
                value:
                  q: 'popularity:>10'
      responses:
        '200':
          description: The request was successful. A list of availabilities is returned.
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total number of availabilities matching the query criteria. Does not include availabilities for product bundles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityWithBundleList'
              examples:
                Response example:
                  $ref: '#/components/examples/AvailabilityWithBundleList'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: POST-availability-search-products-site
  /availability/{tenant}/availability/{productId}/{site}:
    description: Availability service
    parameters:
      - $ref: '#/components/parameters/tenant-path'
      - $ref: '#/components/parameters/product-id'
      - $ref: '#/components/parameters/site-path'
    get:
      tags:
        - Availabilities
      summary: Retrieving a product availability
      description: |-
        Retrieves a specified product availability details.
        
        ***

        ### **Additional scope information**
        * The `availability.availability_view_by_vendor` scope is required only when fetching availabilities for a specific vendor. 

        ***
      security:
        - OAuth2:
            - availability.availability_view_by_vendor
      responses:
        '200':
          description: The request was successful. The product availability details are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityWithBundle'
              examples:
                Response example:
                  $ref: '#/components/examples/AvailabilityWithBundle'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '404':
          $ref: '#/components/responses/NotFoundResponse404'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: GET-availability-retrieve-product
    post:
      tags:
        - Availabilities
      summary: Creating a new availability for a product
      description: |-
        Creates a new availability for a specified product.

        **Note**: We recommend not to create a new product availability for a site named `main`. A site named `main` works as an aggregator of availability data from other sites. It's not possible to later retrieve availability for a single site when it's called `main`.

        ***

        **Additional scope information**
        * The `availability.availability_manage_by_vendor` scope allows to create availabilities for products belonging to the vendor.

        ***
      security:
        - OAuth2:
            - availability.availability_manage
            - availability.availability_manage_by_vendor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityDto'
            examples:
              Availability:
                $ref: '#/components/examples/AvailabilityDto'
      responses:
        '201':
          description: The request was successful. The availability has been created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
              example:
                id: 5f7c996173fc281cdd412345.
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '409':
          $ref: '#/components/responses/ConflictResponse409'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: POST-availability-add-product
    put:
      tags:
        - Availabilities
      summary: Upserting availability information of a product
      description: |-
        Updates a specified product availability details, or crates a new availability if it doesn't exist yet. 

        **Note**: There is no possibility to update a product bundle availability - it is always equal to the lowest availability found in the bundled products.

        ***

        **Additional scope information**
        * The `availability.availability_manage_by_vendor` scope is only required when updating or creating availabilities belonging to the vendor.

        ***
      security:
        - OAuth2:
            - availability.availability_manage
            - availability.availability_manage_by_vendor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityDto'
            examples:
              Availability:
                $ref: '#/components/examples/AvailabilityDto'
      responses:
        '201':
          description: The request was successful. The availability has been created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
              example:
                id: 5f7c996173fc281cdd412345.
        '204':
          description: The request was successful. The availability has been updated.
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '404':
          $ref: '#/components/responses/NotFoundResponse404'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: PUT-availability-update-product
    delete:
      tags:
        - Availabilities
      summary: Deleting availability information of a product
      description: |-
        Deletes a specified product availability.

        **Note**: There is no possibility to delete a product bundle availability - it is always equal to the lowest availability found in the bundled products.

        ***

        **Additional scope information**
        * The `availability.availability_manage_by_vendor` scope is only required when deleting availabilities belonging to the vendor.

        ***
      security:
        - OAuth2:
            - availability.availability_manage
            - availability.availability_manage_by_vendor
      responses:
        '204':
          description: The request was successful. The availability has been deleted.
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '404':
          $ref: '#/components/responses/NotFoundResponse404'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: DELETE-availability-remove-product
  /availability/{tenant}/availability/bulk:
    parameters:
      - $ref: '#/components/parameters/tenant-path'
      - $ref: '#/components/parameters/vendor-id'
    post:
      tags:
        - Availabilities
      summary: Creating multiple product availabilities
      description: |-
        Creates availability records for a product based on its ID and site. A product can have different availability across sites, so each record is uniquely defined by the combination of `productId` and `site`. The maximum batch size is 200.
        
        **Note**: We recommend not to create new product availabilities for a site named `main`. A site named `main` works as an aggregator of availability data from other sites. It's not possible to later retrieve availability for a single site when it's called `main`.
        
        ***
  
        ### **Additional scope information**
        * The `availability.availability_manage_by_vendor` scope is only required when creating availabilities belonging to the vendor.
  
        ***
      security:
        - OAuth2:
            - availability.availability_manage
            - availability.availability_manage_by_vendor
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AvailabilityBulkDto'
            examples:
              Availability:
                $ref: '#/components/examples/AvailabilityBulkDto'
      responses:
        '207':
          description: Multi-status response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BulkResponse'
              examples:
                Multi-status creation example:
                  $ref: '#/components/examples/BulkCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: POST-availability-tenant-availability-bulk
    put:
      tags:
        - Availabilities
      summary: Upserting multiple availabilities information of a product
      description: |-
        Creates or updates product availability records based on product ID and site. If an availability does not yet exist for a given `productId` and `site`, it is created. If it already exists, it is updated. The maximum batch size is 200.
  
        **Note**: We recommend not to create new product availabilities for a site named `main`. A site named `main` works as an aggregator of availability data from other sites. It's not possible to later retrieve availability for a single site when it's called `main`.
  
        ***
  
        **Additional scope information**
        * The `availability.availability_manage_by_vendor` scope is only required when creating or updating availabilities belonging to the vendor.

        ***
      security:
        - OAuth2:
            - availability.availability_manage
            - availability.availability_manage_by_vendor
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AvailabilityBulkDto'
            examples:
              Availability:
                $ref: '#/components/examples/AvailabilityBulkDto'
      responses:
        '207':
          description: Multi-status response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BulkResponse'
              examples:
                Multi-status upsertion example:
                  $ref: '#/components/examples/BulkUpsertResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: PUT-availability-tenant-availability-bulk
    delete:
      tags:
        - Availabilities
      summary: Deleting multiple availabilities information of a product
      description: |-
        Deletes product availability records identified by the combination of `productId` and `site`. The maximum batch size is 200.
  
        **Note**: There is no possibility to delete a product bundle availability - it is always equal to the lowest availability found in the bundled products.
  
        ***
  
        **Additional scope information**
        * The `availability.availability_manage_by_vendor` scope is only required when deleting availabilities belonging to the vendor.

        ***
      security:
        - OAuth2:
            - availability.availability_manage
            - availability.availability_manage_by_vendor
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AvailabilityDeleteBulkDto'
            examples:
              Availability:
                $ref: '#/components/examples/AvailabilityDeleteBulkDto'
      responses:
        '207':
          description: Multi-status response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BulkResponse'
              examples:
                Multi-status deletion example:
                  $ref: '#/components/examples/BulkDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse401'
        '403':
          $ref: '#/components/responses/ForbiddenResponse403'
        '500':
          $ref: '#/components/responses/ServerErrorResponse500'
      operationId: DELETE-availability-tenant-availability-bulk
components:
  parameters:
    tenant-path:
      in: path
      name: tenant
      required: true
      description: |
        Your Emporix tenant name.

        **Note**: The tenant name should always be provided in lowercase.
      schema:
        type: string
        example: testtenant
    product-id:
      in: path
      name: productId
      required: true
      description: 'Product unique identifier, generated when the product is created through the Product Service.'
      schema:
        type: string
        example: 5f7c996173fc281cdd412345
    site-path:
      in: path
      name: site
      required: true
      description: 'Site code, defined when the site is created.'
      schema:
        type: string
        example: shop1
    vendor-id:
      in: header
      name: venodr-id
      required: false
      description: 'Unique identifier of the vendor. The presence of this header will limit the operation to products assigned to the provided vendor.'
      schema:
        type: string
        example: 68ad7d45c42fc8121a611fec
    location-path:
      in: path
      name: location
      required: true
      description: Location unique identifier.
      schema:
        type: string
        example: 'shop1:1234'
    site:
      in: query
      name: site
      description: "Site code, defined when the site is created. If it's not provided, then availabilities for all sites are returned."
      schema:
        type: string
        example: shop1
    page-size:
      in: query
      name: pageSize
      required: false
      description: |
        Number of items to be retrieved per page.
      schema:
        type: number
        example: 100
        default: 20000
    page-number:
      in: query
      name: pageNumber
      required: false
      description: |
        Page number to be retrieved. The number of the first page is 1.

        **Note:** If the `pageNumber` parameter is passed, size of the pages must be specified in the `pageSize` parameter.
      schema:
        type: number
        example: 5
        default: 1
    all-sites:
      in: query
      name: allSites
      required: false
      description: Flag indicating whether the results should be retrieved from all sites.
      schema:
        type: boolean
        example: true
        default: false
    q:
      in: query
      name: q
      required: false
      description: |
        A standard query parameter is used to search for specific values.

        See: [Standard Practices - Query parameter](https://developer.emporix.io/docs/content/q-param)
      schema:
        type: string
    sort:
      in: query
      name: sort
      required: false
      description: |
        List of properties used to sort the results, separated by colons.
        Possible values:
        * `{fieldName}`
        * `{fieldName}:asc`
        * `{fieldName}:desc`
      schema:
        type: string
  schemas:
    AvailabilityDto:
      type: object
      properties:
        stockLevel:
          type: number
          description: 'Stock level of the product, expressed as a number.'
          example: 10
        available:
          type: boolean
          description: Flag indicating whether the product is available.
          example: true
        popularity:
          type: integer
          description: 'Popularity of the product, expressed as a number.'
          example: 5
        distributionChannel:
          $ref: '#/components/schemas/DistributionChannel'
        mixins:
          type: object
          description: |-
            The field contains mixins values.
          additionalProperties: true
        metadata:
          type: object
          properties:
            mixins:
              type: object
              description: Links to the mixin schemas.
              additionalProperties:
                type: string
              example:
                productCustomAttributes: 'https://res.cloudinary.com/saas-ag/raw/upload/emporix-docs/productCustomAttributesMixIn.v29.json'
    AvailabilityBulkDto:
      type: object
      properties:
        productId:
          type: string
          description: 'Unique identifier of the product.'
          example: '12345'
        site:
          type: string
          description: 'Unique identifier of the site.'
          example: 'shop1'
        stockLevel:
          type: number
          description: 'Stock level of the product, expressed as a number.'
          example: 10
        available:
          type: boolean
          description: 'Flag indicating whether the product is available.'
          example: true
        popularity:
          type: integer
          description: 'Popularity of the product, expressed as a number.'
          example: 5
        distributionChannel:
          $ref: '#/components/schemas/DistributionChannel'
        mixins:
          type: object
          description: 'The field contains mixins values.'
          additionalProperties: true
        metadata:
          type: object
          properties:
            mixins:
              type: object
              description: 'Links to the mixin schemas.'
              additionalProperties:
                type: string
              example:
                productCustomAttributes: 'https://res.cloudinary.com/saas-ag/raw/upload/emporix-docs/productCustomAttributesMixIn.v29.json'
    AvailabilityDeleteBulkDto:
      type: object
      properties:
        productId:
          type: string
          description: 'Unique identifier of the product.'
          example: '12345'
        site:
          type: string
          description: 'Unique identifier of the site.'
          example: 'shop1'
