              type: object
              description: A key-value map, where key is a mixin name and value is a link to the mixin schema.
    CustomInstanceUpdate:
      type: object
      properties:
        name:
          type: object
          description: Localized custom type name in a form of a map of translations.
        owner:
          $ref: '#/components/schemas/CustomInstanceOwnerRequest'
        mixins:
          type: string
          description: A key-value map of additional attributes.
        metadata:
          type: object
          properties:
            version:
              type: integer
              description: Version of the custom instance.  If provided, it will be validated against the current entity version.
            mixins:
              type: object
              description: A key-value map, where key is a mixin name and value is a link to the mixin schema.
    CustomInstanceOwner:
      type: object
      description: |
        Ownership of the custom instance. It can be assigned explicitly during creation by users with a `manage` scope, or populated automatically based on who created the custom instance. Once set, the owner is immutable and cannot be modified.

        The `legalEntityId` field is only present when `type` is `CUSTOMER`.
      properties:
        type:
          type: string
          description: Type of the owner.
          enum:
            - EMPLOYEE
            - CUSTOMER
            - SERVICE
        userId:
          type: string
          description: Identifier of the employee, customer, or service principal associated with the owner.
        legalEntityId:
          type: string
          nullable: true
          description: Legal entity identifier. Only set when `type` is `CUSTOMER`.
      required:
        - type
        - userId
    CustomInstanceOwnerRequest:
      type: object
      description: |
        Ownership of the custom instance that can be provided when creating a custom instance.
        The `owner` field can be set explicitly only by users with a `manage` scope, when the request is authorized with a `manage_own` scope, this field is ignored and ownership is set automatically to the user who created the custom instance.
        When the user has a `manage` scope but this field is not provided, ownership is set automatically to the user who created the custom instance.
      properties:
        type:
          type: string
          description: Type of the owner.
          enum:
            - EMPLOYEE
            - CUSTOMER
        userId:
          type: string
          description: Identifier of the employee or customer associated with the owner.
        legalEntityId:
          type: string
          description: Legal entity identifier. Can be provided only when `type` is `CUSTOMER`.
      required:
        - type
        - userId
    CustomInstanceResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the custom instance.
        name:
          type: object
          description: Localized custom type name in a form of a map of translations.
        type:
          type: string
          description: Custom schema type to which custom instance is related.
        owner:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/CustomInstanceOwner'
        mixins:
          type: string
          description: A key-value map of additional attributes.
        media:
          type: array
          description: List of media IDs assigned to the custom instance.
          items:
            type: string
        metadata:
          allOf:
            - $ref: '#/components/schemas/CustomInstanceMetadata'
    CustomInstancesResponse:
      type: array
      items:
        $ref: '#/components/schemas/CustomInstanceResponse'
    BulkResponse:
      type: array
      items:
        type: object
        properties:
          index:
            type: integer
            description: Index of the processed item, matching the item position in request body.
          code:
            type: integer
            description: HTTP Status Code.
          status:
            type: string
            description: HTTP Status description
          message:
            type: string
            description: Error message.
          details:
            type: array
            items:
              type: object
              properties:
                message:
                  type: string
                  description: Error details.
    BulkPatchCustomInstanceRequest:
      type: object
      required:
        - id
        - data
      properties:
        id:
          type: string
          description: Unique identifier of the custom instance to patch.
        data:
          type: array
          description: List of patch operations to apply to the custom instance.
          items:
            $ref: '#/components/schemas/PatchOperation'
    CustomInstanceMetadata:
      type: object
      properties:
        createdAt:
          type: string
          description: 'Date and time when the object was created, compliant with the ISO 8601 standard. For example: `2022-03-31T09:52:15.423Z`'
        modifiedAt:
          type: string
          description: 'Date and time when the object was last modified, compliant with the ISO 8601 standard. For example: `2022-03-31T09:52:15.423Z`'
        version:
          type: integer
          description: Version of the custom instance.
        mixins:
          type: object
          description: A key-value map, where key is a mixin name and value is a link to the mixin schema.
    PatchOperation:
      type: object
      properties:
        op:
          type: string
          enum:
            - add
            - remove
            - replace
          description: 'Indicates an operation which should be done on a return. Available operations: `add` `remove` and `replace`'
        path:
          type: string
          description: |-
            Path to the field to update.

            Examples: `/name`, `/mixins/additionalAttributes/externalId`, `/mixins/additionalAttributes/careInstructions/1`.

            To append an item to an array mixin field (for example, a table row), use `add` with a path ending in `/-`. The `-` means append after the last element.
        value:
          oneOf:
            - type: object
            - type: string
            - type: number
          description: 'Indicates a value that should be changed or added. The value can be of a primitive type, like string, number, boolean or it can be an object or an array.'
      required:
        - op
        - path
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: 'https://api.emporix.io/oauth/token'
          scopes:
            schema.schema_manage: Required for managing schemas.
            schema.schema_read: Required for reading schemas.
            schema.custominstance_read: Read custom instances of any custom schema type.
            schema.custominstance_manage: Manage custom instances of any custom schema type.
            'custom.{lowerCaseType}_manage': Manage custom instances of a given type. For example, for type `DOCUMENT` → `custom.document_manage`.
            'custom.{lowerCaseType}_manage_own': Allows to manage only your own custom instances of a given type. For example, for type `DOCUMENT` → `custom.document_manage_own`.
            'custom.{lowerCaseType}_read': Read custom instances of a given type. For example, for type `DOCUMENT` → `custom.document_read`.
            'custom.{lowerCaseType}_read_own': Allows to read only your own custom instances of a given type. For example, for type `DOCUMENT` → `custom.document_read_own`.
  parameters:
    trait_validateReferences:
      name: validateReferences
      in: query
      required: false
      schema:
        type: boolean
        default: true
      description: |
        When set to true, references are validated if the provided resources exist. If set to false, validation is skipped.
    trait_validateReferences_bulk:
      name: validateReferences
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: |
        When set to true, references are validated if the provided resources exist. If set to false, validation is skipped.
    type:
      name: type
      in: path
      required: true
      description: |
        Custom schema type to which the custom instance is associated.

      schema:
        example: CUSTOM_DOCUMENT
        type: string
    tenant:
      name: tenant
      in: path
      required: true
      description: |
        Your Emporix tenant name.

        **Note**: Always write the tenant name in lowercase.
      schema:
        pattern: '^[a-z][a-z0-9]+$'
        minLength: 3
        maxLength: 16
        type: string
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of the entity.
    version:
      name: version
      in: query
      required: true
      schema:
        type: integer
      description: Version of the entity.
    trait_schemaVersion:
      name: version
      in: query
      required: false
      schema:
        type: integer
      description: Version of the entity.
      example: 1
    trait_mode:
      name: mode
      in: query
      required: false
      schema:
        type: string
        enum: [REPLACE, ADD, REMOVE]
        default: REPLACE
      description: Defines how types assigned to given schema should be resolved. REPLACE is a default value. REPLACE takes provided types and replaces the existing ones with it. ADD adds provided types to the existing ones. REMOVE removes provided types from the existing ones.
    trait_paged_pageNumber:
      name: pageNumber
      in: query
      description: |
        Page number to be retrieved. The number of the first page is 1.
      schema:
        default: 1
        minimum: 1
        type: integer
    trait_sort:
      name: sort
      in: query
      description: |-
        List of properties used to sort the results, separated by colons. The order of properties indicates their priority in sorting.

        Possible values:
        * `{fieldName}`
        * `{fieldName}:asc`
        * `{fieldName}:desc`

        **Note:** If you want to sort the results by localized properties, the possible values are:
          * `{fieldName}.{language}`
          * `{fieldName}.{language}:asc`
          * `{fieldName}.{language}:desc`

        If the sorting direction is not specified, the fields are sorted in ascending order.
      schema:
        type: string
    trait_paged_pageSize:
      name: pageSize
      in: query
      description: |
        Number of items to be retrieved per page.
      schema:
        default: 60
        minimum: 1
        type: integer
    trait_fields:
      name: fields
      in: query
      description: |
        Fields to be included in the response.
      schema:
        type: string
    trait_expand_schemas:
      name: expandSchemas
      in: query
      description: |
        Determines whether the response will include information about associated schemas.
      schema:
        default: false
        type: boolean
    trait_expand_references:
      name: expand
      in: query
      required: false
      schema:
        type: string
      description: |
        Fetches data about expanded references. You can provide full path to the reference, use wildcard character `*`, or provide a specific index (starting with 0) in array of references. Multiple paths can be specified by separating them with commas.
        
        **Examples:**
        * `customAttributes.references.product_reference` - expands a specific reference
        * `*` - expands all references
        * `customAttributes.*` - expands all references within customAttributes
        * `customAttributes.references.customers_array.0` - expands the first element in an array of references
    trait_q_param:
      name: q
      in: query
      description: |
        A standard query parameter is used to search for specific values.

        * Searching for items by string-based properties:
          * By a field value: `q=siteCode:main`, where `siteCode` is the field name, and `main` is its desired value.
          * By a localized field value: `q=items.product.name.en:apple_lobo`, where `name` is the field name of product, `en` is the language code, and `apple_lobo` is the field value expressed in the specified language. **Note**: This query works only for localized fields, which are stored in a map format, where `key` is the language code and `value` is the translation to particular language.
        * Searching for items by a number-based property:
          * With a specific value: `q=items.quantity.quantity:20`
          * With a value greater than: `q=items.quantity.quantity:>20`
          * With a value lower than: `q=items.quantity.quantity:<20`
          * With a value greater than or equal to: `q=items.quantity.quantity:>=20`
          * With a value lower than or equal to: `q=items.quantity.quantity:<=20`
          * With a value within a range of values: `q=items.quantity.quantity:(>=10 AND <=20)`\
           where `items.quantity.quantity` is the name of the number-based field, and `20` is its querying value.
        * Searching for items by a date-based property: All number-based property queries are also valid for dates. In that case, the date should be placed within double quotes: `q=metadataCreatedAt:(>="2021-05-18T07:27:27.455Z" AND <"2021-05-20T07:27:27.455Z")`
        * Searching for items by a boolean-based property: `q=description.multiLanguage:true`, where `description.multiLanguage` is the boolean field name, and `true` is its desired value.
        * Searching for items with a nonexistent or empty property: `q=description.en:null`, where `description.en` is the field that has its value set to `null`.
        * Searching for items with an existing property: `q=mixins.mixinName:exists`, where the specific mixin named `mixinName` exists in the database.
        * Searching for items by multiple specific values: `q=id:(5c3325baa9812100098ff48f,5c3325d1a9812100098ff494)`, where `id` is the field name, and strings within the bracket are the desired values.
        * Searching for items by multiple fields: `q=id:5c3325baa9812100098ff48f siteCode:main` where `id` and `siteCode` are field names. All objects that contain the specified values are returned. Multiple fields (separated by space) can be specified. Multiple values for each field can also be specified in the format presented earlier.
        * Searching for items with string-based properties conforming to a regex: `q=siteCode:~ain` or `q=code:(~U PL)` - in case of searching for strings with space, where `siteCode` is the name of the field, and `ain` or `U PL` is its querying regex.
        * Searching for items with a localized string-based property conforming to a regex: `items.product.name.en:~(Yoghurt im)` - where `name` is the product field name, `en` is the desired language, and `Joghurt im` is the search term.
      schema:
        type: string
        example: 'siteCode:{main}'
    trait_contentLanguage_header:
      in: header
      name: Content-Language
      description: The Content-Language request HTTP header defines language(s) of the payload.
      schema:
        type: string
        example: de
    trait_acceptLanguage_header:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      description: |
        List of language codes acceptable for the response. You can specify factors that indicate which language should be retrieved if the one with a higher factor was not found in the localized fields. If a value is specified, then it must be present in the tenant configuration.
        * If the header is set to a particular language or a list of languages, all localized fields are retrieved as strings.
        * If the header is set to `*`, all localized fields are retrieved as maps of translations, where the keys are language codes and values are the fields in their respective languages.
        * If the header is empty, localized fields are retrieved in the default language defined in the Configuration Service.
    trail_xTotalCount_header:
      name: X-Total-Count
      in: header
      required: false
      schema:
        type: boolean
        example: true
        default: false
      description: |
        Flag indicating whether the total number of retrieved items should be returned.
  responses:
    Unauthorized_401:
      description: Given request is unauthorized - the authorization token is invalid or has expired. It usually means that the tenant from the token does not match tenant from path.
      content:
        application/json:
          schema:
            type: object
            properties:
              fault:
                type: object
                properties:
                  faultstring:
                    type: string
                  detail:
                    type: object
                    properties:
                      errorcode:
                        type: string
          examples:
            Invalid Access Token:
              value:
                fault:
                  faultstring: Invalid Access Token
                  detail:
                    errorcode: keymanagement.service.invalid_access_token
            Unauthorized:
              value: {}
    Bad_request_400:
      description: Unsupported language provided.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              status:
                type: string
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    type:
                      type: string
                    message:
                      type: string
                    moreInfo:
                      type: string
          examples:
            Unsupported language:
              value:
                code: 400
                status: Bad Request
                message: Language header validation failed.
                details:
                  - message: 'Following languages are not supported: ''ru'''
    Bad_request_400_mixins:
      description: Mixins validation failed.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              status:
                type: string
              message:
                type: string
              errorCode:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    type:
                      type: string
                    message:
                      type: string
                    moreInfo:
                      type: string
          examples:
            Bad request:
              value:
                code: 400
                status: Bad Request
                message: There is a validation error. Please check the details..
                details:
                  - message: 'null: instance type (boolean) does not match any allowed primitive type (allowed: ["integer","number"]): [mixins:productCustomAttributes:popularity]'
    Bad_request_400_cl:
      description: Unsupported content language provided.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              status:
                type: string
              message:
                type: string
              errorCode:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    type:
                      type: string
                    message:
                      type: string
                    moreInfo:
                      type: string
          examples:
            Bad request:
              value:
                code: 400
                status: Bad Request
                message: Language header validation failed.
                details:
                  - message: 'Following languages are not supported: ''ru'''
    Unathorized_401:
      description: Given request is unauthorized - the authorization token is invalid or has expired. It usually means that tenant from the token does not match tenant from path.
      content:
        application/json:
          schema:
            type: object
            properties:
              fault:
                type: object
                properties:
                  faultstring:
                    type: string
                  detail:
                    type: object
                    properties:
                      errorcode:
                        type: string
          examples:
