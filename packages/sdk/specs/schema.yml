                  code: 409
                  status: Conflict
                  message: Custom instance with id='456' already exists for type='CUSTOM'
        '401':
          $ref: '#/components/responses/Unauthorized_401'
        '403':
          $ref: '#/components/responses/Forbidden_403'
      operationId: POST-schema-create-custom-instances-bulk
      security:
        - OAuth2:
            - schema.custominstance_manage
            - 'custom.{lowerCaseType}_manage'
            - 'custom.{lowerCaseType}_manage_own'
    put:
      summary: Upserting custom instances in bulk
      description: |-
        Upserts multiple custom instances. The maximum batch size is 200.

      tags:
        - Custom Instance
      parameters:
        - $ref: '#/components/parameters/trait_validateReferences_bulk'
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                allOf:
                  - type: object
                    properties:
                      id:
                        type: string
                        description: Custom instance id
                    required:
                      - id
                  - $ref: '#/components/schemas/CustomInstanceUpdate'
            example:
              - id: '123'
                name: {
                  "en": "Report"
                }
                mixins: {
                  productCustomAttributes: {
                    inStock: true,
                    popularity: 1
                  }
                }
                metadata: {
                  mixins: {
                    "productCustomAttributes": 'https://res.cloudinary.com/saas-ag/raw/upload/emporix-docs/productCustomAttributesMixIn-v38.json'
                  }
                }
              - id: '456'
                name: {
                  "en": "Manual"
                }
      responses:
        '207':
          description: 'Bulk operation was successful'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResponse'
              example:
                - index: 0
                  code: 201
                  status: Created
                - index: 1
                  code: 204
                  status: No Content
        '401':
          $ref: '#/components/responses/Unauthorized_401'
        '403':
          $ref: '#/components/responses/Forbidden_403'
      operationId: PUT-schema-create-custom-instances-bulk
      security:
        - OAuth2:
            - schema.custominstance_manage
            - 'custom.{lowerCaseType}_manage'
            - 'custom.{lowerCaseType}_manage_own'
    delete:
      summary: Deleting custom instances in bulk
      description: |-
        Removes multiple custom instances.

        **Note**:
        The IDs of items should be defined in the request body as an array of strings.
        
        **Example**: `["firstId", "secondId", "thirdId"]`

      tags:
        - Custom Instance
      responses:
        '207':
          description: 'Bulk operation was successful'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResponse'
              example:
                - index: 0
                  code: 204
                  status: No Content
                - index: 1
                  code: 204
                  status: No Content
        '401':
          $ref: '#/components/responses/Unauthorized_401'
        '403':
          $ref: '#/components/responses/Forbidden_403'
      operationId: DELETE-schema-create-custom-instances-bulk
      security:
        - OAuth2:
            - schema.custominstance_manage
            - 'custom.{lowerCaseType}_manage'
            - 'custom.{lowerCaseType}_manage_own'
  '/schema/{tenant}/custom-entities/export':
    parameters:
      - $ref: '#/components/parameters/tenant'
    post:
      tags:
        - Export / Import
      summary: Exporting Custom Entities
      description: |
        Exports custom entities with corresponding schemas.
      operationId: POST-schema-export-custom-entities
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
            example:
              - CUSTOM_PRODUCT
              - MANUFACTURER
              - CAR
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportImportResponse'
              example:
                exportedAt: "2026-04-29T07:05:18.857291343Z"
                data: MQUlOVF9BR0VOVF9DT05URVhUIl19XX1dfQ==
        '400':
          $ref: '#/components/responses/Bad_request_400_cl'
        '401':
          $ref: '#/components/responses/Unauthorized_401'
        '403':
          description: Permission denied due to insufficient rights. This may happen when the request does not contain sufficient scopes for the given query values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Forbidden:
                  value:
                    code: 403
                    status: Forbidden
                    message: You need to choose the required scope to complete this action.
                    details:
                      - message: 'Required scope(s): schema.schema_manage'
      security:
        - OAuth2:
            - schema.schema_manage
  '/schema/{tenant}/custom-entities/import':
    parameters:
      - $ref: '#/components/parameters/tenant'
    post:
      tags:
        - Export / Import
      summary: Importing Custom Entities
      description: |
        Imports custom entities with corresponding schemas.
        
        
        **Note**: If given `Custom Entity Type` or `Schema` already exists then it will be created with `_COPY` suffix. For example, `CUSTOM_PRODUCT` will be created as `CUSTOM_PRODUCT_COPY`.
      operationId: POST-schema-import-custom-entites
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportImportRequest'
            example:
              data: MQUlOVF9BR0VOVF9DT05URVhUIl19XX1dfQ==
      responses:
        '204':
          description: 'No content'
        '400':
          $ref: '#/components/responses/Bad_request_400_cl'
        '401':
          $ref: '#/components/responses/Unauthorized_401'
        '403':
          description: Permission denied due to insufficient rights. This may happen when the request does not contain sufficient scopes for the given query values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Forbidden:
                  value:
                    code: 403
                    status: Forbidden
                    message: You need to choose the required scope to complete this action.
                    details:
                      - message: 'Required scope(s): schema.schema_manage'
      security:
        - OAuth2:
            - schema.schema_manage
