      description: Id of the created schema.
    SchemaType:
      type: string
      description: Type which the schema should be assigned to. Can be one of the predefined values or any custom schema type id.
      enum: [CART, CART_ITEM, CATEGORY, COMPANY, COUPON, CUSTOMER, CUSTOMER_ADDRESS, ORDER, ORDER_ENTRY, PRODUCT, QUOTE, RETURN, PRICE_LIST, SITE, CUSTOM_ENTITY, VENDOR, MEDIA]
    SchemaTypes:
      type: array
      description: List of types to which assign the schema.
      items:
        $ref: '#/components/schemas/SchemaType'
    SchemaAttributeType:
      type: string
      description: |
        Type of the attribute.
        
        **Note**: The `REFERENCE` type is only available for custom schema types.
      enum: [TEXT, NUMBER, DECIMAL, BOOLEAN, DATE, TIME, DATE_TIME, ENUM, ARRAY, OBJECT, REFERENCE]
    Localized:
      type: boolean
      description: Whether the attribute is localized or not. Only attributes of 'TEXT' type can be localized.
    SchemaAttributeMetadata:
      type: object
      description: Metadata of the schema attribute.
      properties:
        readOnly:
          type: boolean
          description: Whether the attribute is read-only or not.
        localized:
          $ref: '#/components/schemas/Localized'
        required:
          type: boolean
          description: Whether the attribute is required or not. Attributes of 'BOOLEAN' type cannot be required.
        nullable:
          type: boolean
          description: Whether the attribute could accept null or not.
    SchemaAttributeValue:
      type: object
      description: |
        Value of the attribute. Valid for `ENUM` and `REFERENCE` types.
        
        For `ENUM` type, the value represents one of the allowed enum values.
        
        For `REFERENCE` type, the value represents the reference type (e.g., `PRODUCT`, `ORDER`, `ORDER_ENTRY`, `CART`, `CART_ITEM`, `PRICE`, `CUSTOMER`, `COMPANY`, `MEDIA`, `PRICE_LIST`, `CUSTOMER_SEGMENT`, `CATEGORY`, or any custom schema type).
      properties:
        value:
          type: string
      required:
        - value
    SchemaFileAttributeResponse:
      type: object
      description: Schema attribute.
      properties:
        key:
          type: string
          description: Unique key of the attribute.
        metadata:
          $ref: '#/components/schemas/SchemaAttributeMetadata'
        values:
          type: array
          description: List of available values for the attribute. Only valid for `ENUM` and `REFERENCE` types.
          items:
            $ref: '#/components/schemas/SchemaAttributeValue'
    SchemaAttribute:
      type: object
      description: Schema attribute.
      properties:
        key:
          type: string
          description: Unique key of the attribute.
        name:
          type: object
          description: Localized schema name in a form of a map of translations.
        description:
          type: object
          description: Localized schema description in a form of a map of translations.
        type:
          $ref: '#/components/schemas/SchemaAttributeType'
        metadata:
          $ref: '#/components/schemas/SchemaAttributeMetadata'
        values:
          type: array
          description: List of available values for the attribute. Only valid for `ENUM` and `REFERENCE` type.
          items:
            $ref: '#/components/schemas/SchemaAttributeValue'
        attributes:
          type: array
          description: Object's properties. It can only be provided for attribute of `OBJECT` type.
          items:
            $ref: '#/components/schemas/SchemaAttribute'
        arrayType:
